app = "gh-webhook-receiver"
primary_region = "ams"

[build]

[env]
  PORT = "8080"
  WEBHOOK_RECEIVER_CLIENT_IP_HEADER = "Fly-Client-IP"
  WEBHOOK_RECEIVER_LISTEN_ADDR = ":8080"
  WEBHOOK_RECEIVER_PUBLIC_BASE_URL = "https://webhook-receiver.devmino.cloud"
  WEBHOOK_RECEIVER_STORE_PATH = "/data/webhook-receiver.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "data"
  destination = "/data"
  initial_size = 2
  scheduled_snapshots = false

[[vm]]
  size = "shared-cpu-1x"
